<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>健康・美容｜厳選アイテム</title>
    <meta name="description" content="サプリメント、食品、睡眠グッズ、ボディケアなど、本当に使い続けている健康・美容アイテムを厳選。忖度なし、全部自腹購入。">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⭐</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap" rel="stylesheet">
    <!-- 共通CSSを親ディレクトリから読み込み -->
    <link rel="stylesheet" href="../style.css">
    <style>
        /* カテゴリ固有のアクセントカラーを上書き */
        .hero-eyecatch {
            color: #10b981;
            background: rgba(16, 185, 129, 0.08);
            border-color: rgba(16, 185, 129, 0.2);
        }
        .trust-chip svg { color: #10b981; }
    </style>
</head>
<body>
    <!-- 動的背景スライダー（共通アセットを参照） -->
    <div class="bg-slider">
        <div class="bg-slide" style="background-image: url('../assets/bg1.png'); animation-delay: 0s;"></div>
        <div class="bg-slide" style="background-image: url('../assets/bg4.png'); animation-delay: 10s;"></div>
        <div class="bg-slide" style="background-image: url('../assets/bg2.png'); animation-delay: 20s;"></div>
        <div class="bg-slide" style="background-image: url('../assets/bg3.png'); animation-delay: 30s;"></div>
        <div class="bg-slide" style="background-image: url('../assets/bg5.png'); animation-delay: 40s;"></div>
    </div>

    <!-- ヒーロー（カテゴリ別） -->
    <header class="hero hero--health">
        <div class="hero-inner">
            <a href="../" class="hero-back">← カテゴリ一覧に戻る</a>
            <p class="hero-eyecatch">健康・美容</p>
            <h1 class="hero-title"><em>身体</em>が変わると、<br>毎日が変わる。</h1>
            <p class="hero-desc">サプリ・食品・睡眠グッズ・ボディケアなど、<br><strong>半年以上使い続けて</strong>「これは手放せない」と思えたものだけ。</p>
            <!-- 信頼バッジ -->
            <div class="trust-row">
                <span class="trust-chip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>全部自腹で購入</span>
                <span class="trust-chip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>忖度なしレビュー</span>
                <span class="trust-chip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>愛用品のみ掲載</span>
            </div>

        </div>
    </header>

    <!-- 検索 -->
    <div class="search-section">
        <div class="container">
            <div class="search-box">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
                </svg>
                <input type="text" id="searchInput" placeholder="アイテムを探す..." autocomplete="off">
            </div>
        </div>
    </div>

    <!-- メインコンテンツ -->
    <main class="main">
        <div class="container">
            <!-- ピン留め商品（常時表示） -->
            <section class="latest-section" id="pinnedSection">
                <h2 class="section-title">いつものおすすめ</h2>
                <p class="section-desc">長く使い続けて、本当に手放せないと思えたものだけ。</p>
                <div class="latest-grid" id="pinnedGrid"></div>
            </section>

            <!-- 最近の動画で紹介（7日以内） -->
            <section class="products-section" id="recentSection" style="display:none;">
                <h2 class="section-title">最近の動画で紹介</h2>
                <p class="section-desc">直近7日間の動画で取り上げたアイテム。</p>
                <div class="products-grid" id="recentGrid"></div>
            </section>

            <!-- 全商品一覧（検索時に使用） -->
            <section class="products-section" id="allSection" style="display:none;">
                <h2 class="section-title" id="productsTitle">すべてのアイテム</h2>
                <div class="products-grid" id="productsGrid"></div>
                <div class="empty-state" id="emptyState" style="display:none;">
                    <p>該当する商品が見つかりません</p>
                </div>
            </section>
        </div>
    </main>

    <!-- フッター -->
    <footer class="footer">
        <div class="container">
            <p class="footer-note">※ 当ページのリンクにはアフィリエイトリンクが含まれています（PR）</p>
            <p class="footer-note">掲載商品はすべて自腹で購入し、実際に使用したうえで掲載しています</p>
            <p class="footer-copy">&copy; 2026</p>
        </div>
    </footer>

    <!-- カテゴリ設定（app.js がこの変数を読み取ってフィルタリングする） -->
    <script>window.HARM_CATEGORY = 'health';</script>
    <script src="../app.js"></script>
</body>
</html>
